services:
  bitsocial-github-alerts:
    profiles:
      - app
    container_name: '${COMPOSE_PROJECT_NAME}-bitsocial-github-alerts'
    build: .
    restart: unless-stopped
    networks:
      - telegram_bots
    environment:
      - GITHUB_TELOXIDE_TOKEN=${GITHUB_TELOXIDE_TOKEN}
      - DATABASE_URL=postgresql://admin:${DATABASE_PASSWORD}@bitsocial-github-alerts-db
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL}
      - RUST_BACKTRACE=1
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID}
    depends_on:
      - bitsocial-github-alerts-db
    expose:
      - 8080

  bitsocial-github-alerts-db:
    container_name: '${COMPOSE_PROJECT_NAME}-bitsocial-github-alerts-db'
    image: postgres:17
    restart: unless-stopped
    networks:
      - telegram_bots
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_USER=admin
    ports:
      - "5445:5432"

networks:
  telegram_bots:
    name: telegram_bots
